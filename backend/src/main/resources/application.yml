server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

loadstar:
  # project root is now passed as API parameter (?root=...)
  search:
    max-results: 50
    snippet-lines: 3
    min-query-length: 2

spring:
  devtools:
    restart:
      enabled: true
  web:
    resources:
      static-locations: file:../frontend/dist/,classpath:/static/
